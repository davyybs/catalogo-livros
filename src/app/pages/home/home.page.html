<ion-header>
  <ion-toolbar color="primary">
    <div>
      <ion-item color="primary">
        <ion-icon name="book" color="secondary"></ion-icon>
      </ion-item>
      <ion-button fill="clear" routerLink="/search" routerDirection="forward">
        <ion-icon name="search" slot="icon-only" color="secondary"></ion-icon>
      </ion-button>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content color="background">
  @for (book of books; track book.id) {
    <ion-card color="card-background">
      <ion-img [src]="book.capa" [alt]="book.titulo"></ion-img>

      <div>
        <ion-card-header>
          <ion-card-title>{{ book.titulo }}</ion-card-title>
          <ion-card-subtitle>{{ book.autor }}</ion-card-subtitle>
        </ion-card-header>
        <ion-card-content>
          <div>
            <p><strong>Páginas lidas:</strong> {{ book.paginasLidas || 0 }}</p>
            <p><strong>Status:</strong> {{ book.status || 'Não iniciado' }}</p>
          </div>
          <ion-button shape="round" fill="clear" [routerLink]="['/book', book.id]">
            <ion-icon name="ellipsis-horizontal" slot="icon-only" color="secondary"></ion-icon>
          </ion-button>
        </ion-card-content>
      </div>
    </ion-card>
  } @empty {
    <div>
      <h2>Adicione um livro a lista!</h2>
    </div>
  }

</ion-content>
